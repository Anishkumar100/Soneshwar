<style>
    .neon-button {
    width: 200px;
    height: 40px;
    border-radius: 10px;
    background-color: #000;
    border: 2px solid #9400D3; /* Dark purple border */
    color: #9400D3; /* Dark purple text */
    text-transform: uppercase;
    font-size: 20px;
    font-family: "monoton";
    cursor: pointer;
    position: relative;
    outline: none;
    transition: all 0.3s ease;
}

.neon-button::before,
.neon-button::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(45deg, #ff00ff, #9400D3);
    z-index: -1;
    filter: blur(5px);
    opacity: 0.6;
    transition: opacity 0.3s ease;
}

.neon-button::before {
    filter: blur(10px);
    opacity: 0.3;
}

.neon-button:hover::before,
.neon-button:hover::after {
    opacity: 1;
}

.neon-button:hover {
    color: #000;
    background: linear-gradient(45deg, #ff00ff, #9400D3);
    box-shadow: 0 0 20px #ff00ff, 0 0 30px #9400D3;
}

@media screen and(max-width:600px)
{
#text
{
display: none;
}
}
</style>
